<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meadi Admin | Biometric Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0077b6; --bg: #f4f7fe; --white: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: var(--white); padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .icon-box { font-size: 50px; margin-bottom: 20px; }
        h2 { color: #1b2559; margin-bottom: 10px; }
        p { color: #a3aed0; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .setup-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .setup-btn:active { transform: scale(0.98); }
        .back-link { display: block; margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-box">🛡️</div>
    <h2>Biometric Setup</h2>
    <p>இந்த போனில் கைரேகை மூலம் லாகின் செய்ய விரும்பினால், கீழே உள்ள பட்டனை அழுத்தி உங்கள் கைரேகையை உறுதிப்படுத்தவும்.</p>
    
    <button id="registerBio" class="setup-btn">Register Fingerprint</button>
    
    <a href="admin.html" class="back-link">← Back to Dashboard</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqyyGJt_t0ztknMudFVLmo6relkEa284g",
        authDomain: "meadi-aqua-tech.firebaseapp.com",
        databaseURL: "https://meadi-aqua-tech-default-rtdb.firebaseio.com",
        projectId: "meadi-aqua-tech"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById("registerBio").onclick = async () => {
        if (!window.PublicKeyCredential) {
            return alert("இந்த போனில் கைரேகை (Biometric) வசதி இல்லை அல்லது பிரவுசர் சப்போர்ட் செய்யவில்லை.");
        }

        try {
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);
            
            // கைரேகை பதிவுக்கான செட்டிங்ஸ்
            const createCredentialOptions = {
                publicKey: {
                    challenge: challenge,
                    rp: { name: "Meadi Aqua Tech Admin", id: window.location.hostname },
                    user: {
                        id: Uint8Array.from("Admin-Mathavan", c => c.charCodeAt(0)),
                        name: "admin@meadiaqua.com",
                        displayName: "Mathavan Admin"
                    },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    authenticatorSelection: { userVerification: "required" },
                    timeout: 60000
                }
            };

            const credential = await navigator.credentials.create(createCredentialOptions);
            
            // சிக்னேச்சரை டெக்ஸ்டாக மாற்றுதல்
            const rawId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
            
            // 1. Firebase-ல் சேமித்தல்
            await update(ref(db, 'admin/biometrics'), {
                registeredId: rawId,
                setupDate: new Date().toISOString()
            });

            // 2. இந்த போன் மெமரியில் சேமித்தல் (அடையாளம் காண)
            localStorage.setItem("bioEnabledId", rawId);

            alert("கைரேகை வெற்றிகரமாக பதிவு செய்யப்பட்டது! அடுத்த முறை நீங்கள் பாஸ்வேர்ட் இல்லாமல் லாகின் செய்யலாம்.");
            window.location.href = "admin.html";

        } catch (err) {
            console.error(err);
            alert("பதிவு செய்வதில் தோல்வி: " + err.message);
        }
    };
</script>
</body>
</html>
